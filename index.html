<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>cubing.js WCA Scramble Tester</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel2: #1f2430;
      --text: #e8ecf1;
      --muted: #a9b3c1;
      --border: #2e3545;
      --accent: #6ea8fe;
      --ok: #35c759;
      --err: #ff5f57;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 system-ui, sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 16px;
    }
    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    input, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    textarea {
      min-height: 160px;
      resize: vertical;
    }
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      width: auto;
      cursor: pointer;
      border: none;
      background: var(--accent);
      color: #08111f;
      font-weight: 700;
    }
    button.secondary {
      background: #2c3342;
      color: var(--text);
      border: 1px solid var(--border);
    }
    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    .status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #263047;
      font-size: 12px;
    }
    .pill.ok { background: rgba(53,199,89,.15); color: #7ae59b; }
    .pill.err { background: rgba(255,95,87,.15); color: #ff8d86; }
    .results {
      display: grid;
      gap: 14px;
    }
    .event-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel2);
    }
    .event-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.02);
    }
    .event-name {
      font-weight: 700;
    }
    .meta {
      font-size: 12px;
      color: var(--muted);
    }
    .scrambles {
      padding: 10px 14px 14px;
      display: grid;
      gap: 8px;
    }
    .scramble {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #121621;
      border: 1px solid #252c3b;
      border-radius: 8px;
      padding: 8px 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
    }
  </style>

  <!-- package-style cubing.js imports in browser -->
  <script type="importmap">
  {
    "imports": {
      "cubing/": "https://cdn.cubing.net/v0/js/cubing/"
    }
  }
  </script>
</head>
<body>
  <div class="wrap">
    <h1>cubing.js WCA Scramble Tester</h1>
    <div class="sub">Generate and compare scrambles for all official WCA events.</div>

    <div class="box">
      <div class="grid">
        <div>
          <label for="count">Scrambles per event</label>
          <input id="count" type="number" min="1" max="50" value="5" />
        </div>
        <div>
          <label for="parallel">Parallel events at once</label>
          <input id="parallel" type="number" min="1" max="8" value="3" />
        </div>
      </div>

      <div style="margin-top:14px;">
        <label for="eventCodes">WCA event codes</label>
        <textarea id="eventCodes">222
333
444
555
666
777
333bf
333fm
333oh
clock
minx
pyram
skewb
sq1
444bf
555bf
333mbf</textarea>
      </div>

      <div class="buttons">
        <button id="generateBtn">Generate scrambles</button>
        <button id="copyBtn" class="secondary" type="button">Copy all</button>
        <button id="clearBtn" class="secondary" type="button">Clear</button>
      </div>

      <div class="note">
        Serve over <code>http://</code> or <code>https://</code>. Not <code>file://</code>.
      </div>
    </div>

    <div class="box">
      <div class="status" id="statusLine">
        <span class="pill">Idle</span>
      </div>
    </div>

    <div class="results" id="results"></div>
  </div>

  <script type="module">
    import { randomScrambleForEvent } from "cubing/scramble";
    import { setSearchDebug } from "cubing/search";

    setSearchDebug({
      logPerf: false,
      scramblePrefetchLevel: "none"
    });

    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const countEl = document.getElementById("count");
    const parallelEl = document.getElementById("parallel");
    const eventCodesEl = document.getElementById("eventCodes");
    const resultsEl = document.getElementById("results");
    const statusLineEl = document.getElementById("statusLine");

    let lastOutputText = "";

    function setStatus(items) {
      statusLineEl.innerHTML = "";
      for (const item of items) {
        const span = document.createElement("span");
        span.className = `pill ${item.type || ""}`.trim();
        span.textContent = item.text;
        statusLineEl.appendChild(span);
      }
    }

    function parseEventCodes() {
      return [...new Set(
        eventCodesEl.value
          .split("\n")
          .map(s => s.trim())
          .filter(Boolean)
      )];
    }

    async function generateOne(eventCode) {
      const alg = await randomScrambleForEvent(eventCode);
      return alg.toString();
    }

    async function generateMany(eventCode, count) {
      const out = [];
      for (let i = 0; i < count; i++) {
        out.push(await generateOne(eventCode));
      }
      return out;
    }

    async function runWithConcurrency(tasks, limit) {
      const results = new Array(tasks.length);
      let nextIndex = 0;

      async function worker() {
        while (true) {
          const i = nextIndex++;
          if (i >= tasks.length) return;
          results[i] = await tasks[i]();
        }
      }

      const workers = Array.from(
        { length: Math.min(limit, tasks.length) },
        () => worker()
      );

      await Promise.all(workers);
      return results;
    }

    function renderResults(data) {
      resultsEl.innerHTML = "";
      const lines = [];

      for (const item of data) {
        const card = document.createElement("div");
        card.className = "event-card";

        const head = document.createElement("div");
        head.className = "event-head";

        const left = document.createElement("div");
        left.innerHTML = `
          <div class="event-name">${escapeHtml(item.eventCode)}</div>
          <div class="meta">${item.ok ? `${item.scrambles.length} scramble(s)` : "error"}</div>
        `;

        const right = document.createElement("div");
        right.innerHTML = item.ok
          ? `<span class="pill ok">OK</span>`
          : `<span class="pill err">FAILED</span>`;

        head.appendChild(left);
        head.appendChild(right);

        const body = document.createElement("div");
        body.className = "scrambles";

        if (item.ok) {
          lines.push(`[${item.eventCode}]`);
          item.scrambles.forEach((scramble, idx) => {
            const div = document.createElement("div");
            div.className = "scramble";
            div.textContent = `${idx + 1}. ${scramble}`;
            body.appendChild(div);
            lines.push(`${idx + 1}. ${scramble}`);
          });
          lines.push("");
        } else {
          const div = document.createElement("div");
          div.className = "scramble";
          div.textContent = item.error;
          body.appendChild(div);
          lines.push(`[${item.eventCode}] ERROR: ${item.error}`);
          lines.push("");
        }

        card.appendChild(head);
        card.appendChild(body);
        resultsEl.appendChild(card);
      }

      lastOutputText = lines.join("\n");
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function generateAll() {
      const eventCodes = parseEventCodes();
      const count = Math.max(1, Math.min(50, Number(countEl.value) || 5));
      const parallel = Math.max(1, Math.min(8, Number(parallelEl.value) || 3));

      if (!eventCodes.length) {
        setStatus([{ text: "No event codes", type: "err" }]);
        return;
      }

      generateBtn.disabled = true;
      setStatus([
        { text: "Generating..." },
        { text: `${eventCodes.length} event(s)` },
        { text: `${count} each` }
      ]);

      try {
        const tasks = eventCodes.map((eventCode) => async () => {
          try {
            const scrambles = await generateMany(eventCode, count);
            return { eventCode, ok: true, scrambles };
          } catch (err) {
            return {
              eventCode,
              ok: false,
              error: err?.message || String(err)
            };
          }
        });

        const data = await runWithConcurrency(tasks, parallel);
        renderResults(data);

        const okCount = data.filter(d => d.ok).length;
        const failCount = data.length - okCount;

        setStatus([
          { text: "Done", type: okCount ? "ok" : "" },
          { text: `${okCount} ok`, type: okCount ? "ok" : "" },
          { text: `${failCount} failed`, type: failCount ? "err" : "" }
        ]);
      } finally {
        generateBtn.disabled = false;
      }
    }

    generateBtn.addEventListener("click", generateAll);

    copyBtn.addEventListener("click", async () => {
      if (!lastOutputText) return;
      try {
        await navigator.clipboard.writeText(lastOutputText);
        setStatus([
          { text: "Copied", type: "ok" },
          { text: "Scrambles copied" }
        ]);
      } catch {
        setStatus([{ text: "Copy failed", type: "err" }]);
      }
    });

    clearBtn.addEventListener("click", () => {
      resultsEl.innerHTML = "";
      lastOutputText = "";
      setStatus([{ text: "Cleared" }]);
    });
  </script>
</body>
</html>
