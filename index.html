<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2x2 RUF Scramble Generator</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #f5f7fb;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --border: #2a3140;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, Arial, sans-serif;
      padding: 24px;
    }

    .card {
      width: min(820px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3vw, 2rem);
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .scramble-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .scramble {
      font-size: clamp(1.35rem, 3.8vw, 2.2rem);
      line-height: 1.4;
      padding: 18px;
      background: #0d1016;
      border: 1px solid var(--border);
      border-radius: 14px;
      min-height: 84px;
      display: flex;
      align-items: center;
      word-break: break-word;
      flex: 1 1 420px;
    }

    .top-face-preview {
      display: grid;
      grid-template-columns: repeat(2, 18px);
      grid-template-rows: repeat(2, 18px);
      gap: 2px;
      padding: 4px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      width: max-content;
      flex: 0 0 auto;
    }

    .top-face-sticker {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.18);
    }

    .status {
      font-size: 1rem;
      min-height: 58px;
      color: var(--muted);
      margin-top: 14px;
      padding: 18px;
      background: #0d1016;
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font: inherit;
    }

    button:hover:enabled {
      filter: brightness(1.08);
    }

    .meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>2x2 RUF Scramble Generator</h1>
    <p>Only uses R, U, F moves. Includes simple top-face preview.</p>

    <div class="scramble-row">
      <div class="scramble" id="scramble"></div>
      <div id="topFacePreview" class="top-face-preview" title="Top face preview"></div>
    </div>

    <div class="row">
      <button id="generateBtn">Generate</button>
      <button id="copyBtn">Copy</button>
    </div>

    <div class="status" id="status">Ready.</div>
    <div class="meta">Not full-state official WCA random-state. Stable R/U/F-only generator.</div>
  </main>

  <script>
    const scrambleEl = document.getElementById("scramble");
    const statusEl = document.getElementById("status");
    const copyBtn = document.getElementById("copyBtn");

    const FACE_NAMES = ["U", "R", "F"];
    const SUFFIXES = ["", "'", "2"];

    // 0 URF, 1 UFL, 2 ULB, 3 UBR, 4 DFR, 5 DLF, 6 DBL, 7 DRB
    const MOVE_CP = [
      [3, 0, 1, 2, 4, 5, 6, 7], // U
      [4, 1, 2, 0, 7, 5, 6, 3], // R
      [1, 5, 2, 3, 0, 4, 6, 7]  // F
    ];

    const MOVE_CO = [
      [0, 0, 0, 0, 0, 0, 0, 0], // U
      [2, 0, 0, 1, 1, 0, 0, 2], // R
      [1, 2, 0, 0, 2, 1, 0, 0]  // F
    ];

    const CORNER_COLORS = [
      ["U", "R", "F"],
      ["U", "F", "L"],
      ["U", "L", "B"],
      ["U", "B", "R"],
      ["D", "F", "R"],
      ["D", "L", "F"],
      ["D", "B", "L"],
      ["D", "R", "B"]
    ];

    const TOP_COLOR_INDEX = [0, 2, 1];

    const FACE_COLORS = {
      U: "#ffffff",
      D: "#ffd500",
      F: "#00a651",
      B: "#0051ba",
      R: "#c41e3a",
      L: "#ff5800"
    };

    function randomInt(max) {
      if (window.crypto && crypto.getRandomValues) {
        const arr = new Uint32Array(1);
        let x;
        const limit = Math.floor(0x100000000 / max) * max;
        do {
          crypto.getRandomValues(arr);
          x = arr[0];
        } while (x >= limit);
        return x % max;
      }
      return Math.floor(Math.random() * max);
    }

    function solved2x2State() {
      return {
        cp: [0, 1, 2, 3, 4, 5, 6, 7],
        co: [0, 0, 0, 0, 0, 0, 0, 0]
      };
    }

    function applyFaceMove(state, face) {
      const newCp = new Array(8);
      const newCo = new Array(8);
      const mcp = MOVE_CP[face];
      const mco = MOVE_CO[face];

      for (let i = 0; i < 8; i++) {
        const oldPos = mcp[i];
        newCp[i] = state.cp[oldPos];
        newCo[i] = (state.co[oldPos] + mco[i]) % 3;
      }

      state.cp = newCp;
      state.co = newCo;
    }

    function applyMoveToken(state, token) {
      const faceMap = { U: 0, R: 1, F: 2 };
      const face = faceMap[token[0]];
      if (face == null) return;

      let turns = 1;
      if (token.endsWith("2")) turns = 2;
      else if (token.endsWith("'")) turns = 3;

      for (let i = 0; i < turns; i++) applyFaceMove(state, face);
    }

    function stateFromScramble(scramble) {
      const state = solved2x2State();
      const tokens = scramble.trim().split(/\s+/).filter(Boolean);
      for (const token of tokens) applyMoveToken(state, token);
      return state;
    }

    function topFaceColorsFromState(state) {
      const positions = [2, 3, 1, 0];
      return positions.map((pos) => {
        const cubie = state.cp[pos];
        const ori = state.co[pos];
        return CORNER_COLORS[cubie][TOP_COLOR_INDEX[ori]];
      });
    }

    function renderTopFace(scramble) {
      const preview = document.getElementById("topFacePreview");
      const state = stateFromScramble(scramble);
      const colors = topFaceColorsFromState(state);

      preview.innerHTML = colors.map(face =>
        `<div class="top-face-sticker" style="background:${FACE_COLORS[face]}"></div>`
      ).join("");
    }

    function generateRUFSequence(length = 11) {
      const moves = [];
      let lastFace = -1;

      for (let i = 0; i < length; i++) {
        let face;
        do {
          face = randomInt(3);
        } while (face === lastFace);

        lastFace = face;
        const suffix = SUFFIXES[randomInt(3)];
        moves.push(FACE_NAMES[face] + suffix);
      }

      return moves.join(" ");
    }

    function generateScramble() {
      const length = 9 + randomInt(3); // 9-11
      const scramble = generateRUFSequence(length);

      scrambleEl.textContent = scramble;
      renderTopFace(scramble);
      statusEl.textContent = `Length: ${length}`;
    }

    document.getElementById("generateBtn").addEventListener("click", generateScramble);

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(scrambleEl.textContent);
        const old = copyBtn.textContent;
        copyBtn.textContent = "Copied";
        setTimeout(() => { copyBtn.textContent = old; }, 800);
      } catch {
        const old = copyBtn.textContent;
        copyBtn.textContent = "Failed";
        setTimeout(() => { copyBtn.textContent = old; }, 800);
      }
    });

    generateScramble();
  </script>
</body>
</html>
